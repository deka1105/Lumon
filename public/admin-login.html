<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lumon Admin — Authorization Required</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a1825;color:#c8dde8;font-family:'IBM Plex Mono','Courier New',monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.025) 3px,rgba(0,0,0,.025) 4px);pointer-events:none;}
.wrap{max-width:420px;width:100%;padding:0 24px;text-align:center;}
.logo{font-size:9px;letter-spacing:.38em;color:#1e3a50;margin-bottom:48px;text-transform:uppercase;}
.title{font-family:'IBM Plex Sans',sans-serif;font-weight:300;font-size:28px;color:#c8dde8;letter-spacing:.06em;margin-bottom:8px;}
.sub{font-size:10px;color:#2e5a7a;letter-spacing:.18em;margin-bottom:40px;}
.divider{width:40px;height:.5px;background:#1e3a50;margin:0 auto 40px;}
.file{border:.5px solid #1a3a55;padding:16px 20px;margin-bottom:36px;position:relative;text-align:left;}
.file-lbl{position:absolute;top:-8px;left:14px;background:#0a1825;padding:0 8px;font-size:8px;letter-spacing:.2em;color:#1e3a50;}
.file-row{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:.5px solid #0e2030;}
.file-row:last-child{border-bottom:none;}
.file-l{color:#1e3a50;}.file-r{color:#5a8aaa;}
.google-btn{width:100%;background:transparent;border:.5px solid #1e4a6a;color:#5a8aaa;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.2em;padding:14px;border-radius:3px;cursor:pointer;transition:all .2s;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;}
.google-btn:hover{background:#0e2236;border-color:#3a8abf;color:#c8dde8;}
.google-icon{width:16px;height:16px;flex-shrink:0;}
.err{font-size:9px;color:#c0392b;letter-spacing:.15em;margin-top:16px;}
.back{margin-top:28px;font-size:9px;color:#1e3a50;letter-spacing:.12em;}
.back a{color:#2e5a7a;text-decoration:none;}
.back a:hover{color:#5a8aaa;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Lumon Industries — Admin Terminal</div>
  <div class="title">Authorization Required</div>
  <div class="sub">Restricted to Dept. Head clearance only</div>
  <div class="divider"></div>
  <div class="file">
    <div class="file-lbl">Access Control</div>
    <div class="file-row"><span class="file-l">Zone</span><span class="file-r">Admin Console</span></div>
    <div class="file-row"><span class="file-l">Clearance required</span><span class="file-r">Tier 5 (Cobel)</span></div>
    <div class="file-row"><span class="file-l">Auth method</span><span class="file-r">Google OAuth</span></div>
    <div class="file-row"><span class="file-l">Status</span><span class="file-r" style="color:#c0392b">Awaiting authorization</span></div>
  </div>
  <a class="google-btn" href="/api/auth/google">
    <svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </a>
  <div id="err-msg" class="err" style="display:none"></div>
  <div class="back"><a href="/">← Return to terminal</a></div>
</div>
<script>
const params=new URLSearchParams(location.search);
const err=params.get('error');
if(err){
  const el=document.getElementById('err-msg'); el.style.display='block';
  const msgs={no_code:'Authorization failed — no code returned.',session:'Session error — please try again.',unauthorized:'Access denied — your Google account does not have admin clearance.'};
  el.textContent=msgs[err]||'Authorization error.';
}
</script>
</body>
</html>
